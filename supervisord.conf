[supervisord]
nodaemon        = true
logfile         = /dev/null
logfile_maxbytes= 0
pidfile         = /tmp/supervisord.pid

[program:assp]
process_name    = assp
autostart       = true
autorestart     = true
directory       = /usr/share/assp
command         = /usr/share/assp/assp.pl
startsecs       = 0
stdout_logfile  = /dev/stdout
stdout_logfile_maxbytes = 0
stderr_logfile  = /dev/stderr
stderr_logfile_maxbytes = 0

[program:assp-logs]
process_name    = assp-logs
autostart       = true
autorestart     = true
directory       = /usr/share/assp
command         = tail -F logs/maillog.txt
startsecs       = 0
stdout_logfile  = /dev/stdout
stdout_logfile_maxbytes = 0
stderr_logfile  = /dev/stderr
stderr_logfile_maxbytes = 0

[program:clamd]
process_name    = clamd
command         = /usr/sbin/clamd -F
autostart       = true
autorestart     = true
stdout_logfile  = /dev/stdout
stdout_logfile_maxbytes = 0
stderr_logfile  = /dev/stderr
stderr_logfile_maxbytes = 0

[program:freshclam]
process_name    = freshclam
command         = /usr/bin/freshclam -F
autostart       = true
autorestart     = true
stdout_logfile  = /dev/stdout
stdout_logfile_maxbytes = 0
stderr_logfile  = /dev/stderr
stderr_logfile_maxbytes = 0

[program:assp-cfg-watcher]
process_name    = assp-cfg-watcher
command         = /usr/local/bin/assp-cfg-watcher.sh
autostart       = true
autorestart     = true
stdout_logfile  = /dev/stdout
stdout_logfile_maxbytes = 0
stderr_logfile  = /dev/stderr
stderr_logfile_maxbytes = 0
